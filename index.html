<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodology — Resource Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #6DC04B; --orange: #F07D35; --teal: #35BFBF;
  --dark: #1E1E1E; --mid: #4A4A4A; --light: #F7F6F2;
  --white: #FFFFFF; --border: #E2E0D8;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }

header { background: var(--dark); padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 3px solid var(--orange); }
.logo-mark { width: 44px; height: 44px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-mark svg { width: 24px; height: 24px; fill: white; }
.logo-text h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: white; }
.logo-text p { font-size: .75rem; color: #888; letter-spacing: .08em; text-transform: uppercase; font-weight: 500; }

main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* SEARCH + FILTER BAR */
.search-bar { display: flex; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap svg { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: #aaa; }
input[type=search] { width: 100%; font-family: 'DM Sans', sans-serif; font-size: .9375rem; color: var(--dark); background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: .7rem 1rem .7rem 2.5rem; outline: none; transition: border-color .15s; }
input[type=search]:focus { border-color: var(--teal); }

.filter-pills { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.pill-btn { padding: .4rem 1rem; border-radius: 20px; border: 1.5px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: .8125rem; font-weight: 500; color: var(--mid); cursor: pointer; transition: all .15s; }
.pill-btn:hover { border-color: var(--orange); color: var(--orange); }
.pill-btn.active { background: var(--orange); border-color: var(--orange); color: white; }

/* COUNT */
.results-count { font-size: .8125rem; color: var(--mid); margin-bottom: 1rem; }

/* RESOURCE CARDS */
.resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

.resource-card { background: var(--white); border-radius: 14px; border: 1px solid var(--border); padding: 1.25rem; box-shadow: var(--card-shadow); transition: transform .15s, box-shadow .15s; display: flex; flex-direction: column; }
.resource-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }

.card-type { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .5rem; }
.card-type.blog-post { color: var(--teal); }
.card-type.podcast-episode { color: #9B59B6; }
.card-type.tool { color: var(--orange); }
.card-type.course { color: #E74C3C; }
.card-type.book { color: #2ECC71; }
.card-type.freebie { color: #F39C12; }
.card-type.video { color: #3498DB; }

.card-title { font-weight: 600; font-size: .9375rem; color: var(--dark); margin-bottom: .5rem; line-height: 1.4; }
.card-summary { font-size: .8125rem; color: var(--mid); line-height: 1.6; flex: 1; margin-bottom: 1rem; }
.card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .85rem; }
.tag { font-size: .7rem; padding: 2px 8px; background: var(--light); border: 1px solid var(--border); border-radius: 10px; color: var(--mid); }
.card-link { display: inline-flex; align-items: center; gap: .35rem; font-size: .8125rem; font-weight: 600; color: var(--orange); text-decoration: none; transition: color .15s; }
.card-link:hover { color: #d96a25; }
.card-link svg { width: 13px; height: 13px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 3rem; color: #bbb; }
.empty svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: .3; }

/* ADD RESOURCE PANEL */
.add-btn { display: flex; align-items: center; gap: .5rem; padding: .65rem 1.25rem; background: var(--green); color: white; font-family: 'DM Sans', sans-serif; font-size: .875rem; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: background .15s; white-space: nowrap; }
.add-btn:hover { background: #5aaa3a; }

.modal-overlay { display: none; position: fixed; top:0;left:0;width:100%;height:100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; margin-bottom: 1.25rem; }
.form-row { margin-bottom: 1rem; }
.form-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--mid); display: block; margin-bottom: .4rem; }
.form-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--dark); background: var(--light); border: 1.5px solid var(--border); border-radius: 8px; padding: .65rem .9rem; outline: none; transition: border-color .15s; }
.form-input:focus { border-color: var(--teal); }
textarea.form-input { min-height: 90px; resize: vertical; }
select.form-input { cursor: pointer; }
.modal-actions { display: flex; gap: .75rem; margin-top: 1.25rem; }
.btn-save { flex: 1; padding: .75rem; background: var(--green); color: white; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; }
.btn-save:hover { background: #5aaa3a; }
.btn-cancel { padding: .75rem 1.25rem; background: var(--light); color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }

/* MANAGE PANEL */
.manage-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem; }
.manage-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
.manage-right { display: flex; gap: .75rem; align-items: center; }
.export-btn { display: flex; align-items: center; gap: .4rem; padding: .6rem 1rem; background: var(--white); color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: .8125rem; font-weight: 600; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color .15s; }
.export-btn:hover { border-color: var(--teal); color: var(--teal); }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 9c0 2.4 1.1 4.5 2.8 5.9L7 20h10l-.8-5.1C17.9 13.5 19 11.4 19 9c0-4-3-7-7-7zm0 2c2.8 0 5 2.2 5 5 0 1.8-.9 3.3-2.3 4.3l-.7.5.6 3.7-.6.5H10l-.6-.5.6-3.7-.7-.5C7.9 12.3 7 10.8 7 9c0-2.8 2.2-5 5-5z"/></svg>
  </div>
  <div class="logo-text">
    <h1>Foodology Feeding</h1>
    <p>Resource Library</p>
  </div>
</header>

<main>
  <div class="manage-bar">
    <span class="manage-title">Resources</span>
    <div class="manage-right">
      <button class="export-btn" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <button class="add-btn" onclick="openModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Resource
      </button>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search by title, keyword, or topic..." oninput="filterResources()">
    </div>
  </div>

  <div class="filter-pills" id="filterPills"></div>
  <p class="results-count" id="resultsCount"></p>
  <div class="resource-grid" id="resourceGrid"></div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Resource</h2>
    <div class="form-row">
      <label class="form-label">Title *</label>
      <input type="text" class="form-input" id="fTitle" placeholder="e.g. Why Won't My Child Eat?">
    </div>
    <div class="form-row">
      <label class="form-label">URL / Link *</label>
      <input type="text" class="form-input" id="fUrl" placeholder="https://...">
    </div>
    <div class="form-row">
      <label class="form-label">Type *</label>
      <select class="form-input" id="fType">
        <option value="">Select type...</option>
        <option>Blog Post</option>
        <option>Podcast Episode</option>
        <option>Tool</option>
        <option>Course</option>
        <option>Book</option>
        <option>Freebie</option>
        <option>Video</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Summary</label>
      <textarea class="form-input" id="fSummary" placeholder="Brief description of what this resource covers..."></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Tags (comma separated)</label>
      <input type="text" class="form-input" id="fTags" placeholder="e.g. picky eating, ARFID, sensory, gut health">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveResource()">Save Resource</button>
    </div>
  </div>
</div>

<script>
// ── INITIAL DATA ──────────────────────────────────────────────────────────
const DEFAULT_RESOURCES = [
  {id:'r1',title:'The Next Bite Plan',url:'https://try-coast-0250.glide.page/dl/',type:'Course',summary:'The Next Bite Plan is a simple, structured course to help families take the next step in expanding their child\'s diet.',tags:['picky eating','food expansion','parent course']},
  {id:'r2',title:'Mealtime Mindset',url:'https://www.amazon.com/dp/B0BQ52',type:'Book',summary:'A guide to changing your mindset around mealtimes to reduce stress and increase food acceptance.',tags:['mindset','mealtime','parent guide']},
  {id:'r3',title:'101 Ways to Make Food Fun',url:'https://foodologyfeeding.mykajabi.com',type:'Book',summary:'A playful collection of ideas to help children engage with food in low-pressure, joyful ways.',tags:['food play','picky eating','fun','engagement']},
  {id:'r4',title:'The Picky Eater\'s Plate',url:'https://foodologyfeeding.mykajabi.com/ThePickyEatersPlate',type:'Course',summary:'Helps you build structure, routine, and strategies around mealtimes for picky eaters.',tags:['picky eating','mealtime structure','course']},
  {id:'r5',title:'Nutrient Dense Recipes',url:'https://foodologyfeeding.mykajabi.com',type:'Book',summary:'Simple, nutritious recipes designed for selective eaters to maximize nutrition from accepted foods.',tags:['nutrition','recipes','picky eating']},
  {id:'r6',title:'Mealtime Makeover Course',url:'https://foodologyfeedingtherapy.com',type:'Course',summary:'A self-paced course to help parents transform stressful mealtimes into calm, connected experiences.',tags:['mealtime','parent course','stress','behavior']},
  {id:'r7',title:'Unlocking Mealtimes Roadmap',url:'https://foodologyfeeding.mykajabi.com',type:'Course',summary:'Comprehensive evaluation and personalized roadmap program for children with complex feeding challenges.',tags:['evaluation','roadmap','ARFID','sensory','oral motor','gut health']},
  {id:'r8',title:'Feeding Therapy Insurance Appeal Toolkit',url:'https://foodologyfeedingtherapy.com',type:'Tool',summary:'Templates and guides to help parents appeal insurance denials for feeding therapy services.',tags:['insurance','appeal','feeding therapy','parents']},
  {id:'r9',title:'Food Progress Tracker',url:'https://foodologyfeeding.mykajabi.com',type:'Tool',summary:'Track your child\'s exposure and progress with foods across the stages from fearful to foodie.',tags:['tracking','food exposure','progress','picky eating']},
  {id:'r10',title:'Insurance Appeal for Feeding Therapy',url:'https://foodologyfeedingtherapy.com',type:'Blog Post',summary:'A step-by-step guide to appealing insurance denials for feeding therapy. Know your rights and what to say.',tags:['insurance','appeal','feeding therapy','advocacy']},
  {id:'r11',title:'Why ARFID Treatment Isn\'t Working for My Child',url:'https://foodologyfeedingtherapy.com',type:'Blog Post',summary:'Uncovers the common pitfalls of traditional ARFID treatment and what a more effective approach looks like.',tags:['ARFID','treatment','feeding therapy','why it fails']},
  {id:'r12',title:'Is My Child a Picky Eater or Is It Something More?',url:'https://foodologyfeedingtherapy.com',type:'Blog Post',summary:'Helps parents distinguish between typical picky eating and a more complex feeding disorder.',tags:['picky eating','ARFID','PFD','signs','red flags']},
  {id:'r13',title:'Picky Eating: Why First Bite, No Second? ARFID & PFD',url:'https://foodologyfeedingtherapy.com',type:'Blog Post',summary:'Explores the connection between ARFID, PFD, and the pattern of refusing foods after the first bite.',tags:['ARFID','PFD','picky eating','food refusal','sensory']},
  {id:'r14',title:'Why Your Child Eats for the Feeding Therapist or the Babysitter',url:'https://foodologyfeedingtherapy.com',type:'Blog Post',summary:'Reveals the emotional and relational dynamics that make children eat better with others than at home.',tags:['behavior','mealtime','relationships','feeding therapy','parents']},
  {id:'r15',title:'Should You Worry About Your Toddler\'s Food Strike?',url:'https://foodologyfeeding.mykajabi.com/podcasts/how-to-un-picky-your-picky-eater-2/episodes/2149022919',type:'Podcast Episode',summary:'Breaks down what\'s a normal developmental phase vs. what might be cause for concern with toddler food refusal.',tags:['toddler','food strike','picky eating','development','normal vs not']},
  {id:'r16',title:'4 Hidden Medical Reasons Behind Picky Eating',url:'https://foodologyfeeding.mykajabi.com/podcasts/how-to-un-picky-your-picky-eater-2/episodes/2149063143',type:'Podcast Episode',summary:'The 5 most commonly missed medical reasons behind picky eating including oral motor, sensory, and gut issues.',tags:['medical','picky eating','gut health','sensory','oral motor','ARFID']},
  {id:'r17',title:'3 Signs Waiting It Out Is Okay — and 3 Signs It\'s Not',url:'https://foodologyfeeding.mykajabi.com/podcasts/how-to-un-picky-your-picky-eater-2/episodes/2149063141',type:'Podcast Episode',summary:'Helps parents know when to wait and watch vs. when to seek professional feeding support.',tags:['picky eating','when to seek help','red flags','green flags','toddler']},
  {id:'r18',title:'Don\'t Let Picky Eating Ruin The BBQ',url:'https://foodologyfeeding.mykajabi.com/podcasts/how-to-un-picky-your-picky-eater-2/episodes/2149039214',type:'Podcast Episode',summary:'Strategies to help your child feel safe and calm at summer cookouts and social food events.',tags:['social eating','picky eating','summer','events','anxiety','mealtime']},
  {id:'r19',title:'How to Move From "I Can\'t" to "How Can I?"',url:'https://foodologyfeeding.mykajabi.com/podcasts/how-to-un-picky-your-picky-eater-2/episodes/2149063133',type:'Podcast Episode',summary:'A powerful mindset shift for parents that transforms the feeding therapy journey.',tags:['mindset','parents','feeding therapy','motivation']},
  {id:'r20',title:'Creative Gift Ideas for Your Picky Eater',url:'https://foodologyfeeding.mykajabi.com/podcasts/how-to-un-picky-your-picky-eater-2/episodes/2148908883',type:'Podcast Episode',summary:'Gift ideas that support sensory exploration, oral motor development, and food mindset for picky eaters.',tags:['gifts','oral motor','sensory','picky eating','holiday']},
  {id:'r21',title:'Ultimate Guide for Parents — Free Ebook',url:'https://foodologyfeeding.mykajabi.com/opt-in-a8d2ddd1-d325-42a1-83cb-d1346e7cd59d',type:'Freebie',summary:'A 24-page free ebook guide for parents of picky eaters covering strategies, signs, and next steps.',tags:['freebie','ebook','picky eating','parents','guide']},
];

const TYPES = ['All','Blog Post','Podcast Episode','Tool','Course','Book','Freebie','Video'];
const TYPE_SLUG = t => t.toLowerCase().replace(/\s+/g,'-');

let resources = [];
let activeType = 'All';
let editingId = null;

// ── STORAGE ───────────────────────────────────────────────────────────────
async function loadResources(){
  try {
    const result = await window.storage.get('resources');
    if(result && result.value){
      resources = JSON.parse(result.value);
    } else {
      resources = DEFAULT_RESOURCES;
      await saveToStorage();
    }
  } catch(e) {
    resources = DEFAULT_RESOURCES;
  }
  render();
}

async function saveToStorage(){
  try { await window.storage.set('resources', JSON.stringify(resources)); } catch(e){}
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  renderPills();
  filterResources();
}

function renderPills(){
  const pills = document.getElementById('filterPills');
  pills.innerHTML = TYPES.map(t=>
    `<button class="pill-btn${activeType===t?' active':''}" onclick="setType('${t}')">${t}</button>`
  ).join('');
}

function setType(t){
  activeType = t;
  renderPills();
  filterResources();
}

function filterResources(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = resources.filter(r=>{
    const matchType = activeType === 'All' || r.type === activeType;
    const matchSearch = !q ||
      r.title.toLowerCase().includes(q) ||
      (r.summary||'').toLowerCase().includes(q) ||
      (r.tags||[]).some(tag=>tag.toLowerCase().includes(q));
    return matchType && matchSearch;
  });

  document.getElementById('resultsCount').textContent =
    `${filtered.length} resource${filtered.length!==1?'s':''} found`;

  const grid = document.getElementById('resourceGrid');
  if(!filtered.length){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No resources match your search.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(r=>`
    <div class="resource-card">
      <p class="card-type ${TYPE_SLUG(r.type)}">${r.type}</p>
      <p class="card-title">${r.title}</p>
      ${r.summary?`<p class="card-summary">${r.summary}</p>`:''}
      ${r.tags&&r.tags.length?`<div class="card-tags">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:auto">
        <a class="card-link" href="${r.url}" target="_blank" rel="noopener">
          View resource
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <div style="display:flex;gap:.5rem">
          <button onclick="editResource('${r.id}')" style="background:none;border:none;cursor:pointer;color:#aaa;font-size:.75rem;font-family:'DM Sans',sans-serif">Edit</button>
          <button onclick="deleteResource('${r.id}')" style="background:none;border:none;cursor:pointer;color:#daa;font-size:.75rem;font-family:'DM Sans',sans-serif">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id=null){
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Resource' : 'Add Resource';
  if(id){
    const r = resources.find(x=>x.id===id);
    document.getElementById('fTitle').value = r.title;
    document.getElementById('fUrl').value = r.url;
    document.getElementById('fType').value = r.type;
    document.getElementById('fSummary').value = r.summary||'';
    document.getElementById('fTags').value = (r.tags||[]).join(', ');
  } else {
    document.getElementById('fTitle').value='';
    document.getElementById('fUrl').value='';
    document.getElementById('fType').value='';
    document.getElementById('fSummary').value='';
    document.getElementById('fTags').value='';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

async function saveResource(){
  const title = document.getElementById('fTitle').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const type = document.getElementById('fType').value;
  const summary = document.getElementById('fSummary').value.trim();
  const tagsRaw = document.getElementById('fTags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(Boolean) : [];

  if(!title||!url||!type){ alert('Please fill in Title, URL, and Type.'); return; }

  if(editingId){
    const idx = resources.findIndex(r=>r.id===editingId);
    if(idx>-1) resources[idx] = {...resources[idx], title, url, type, summary, tags};
  } else {
    resources.unshift({ id:'r'+Date.now(), title, url, type, summary, tags });
  }

  await saveToStorage();
  closeModal();
  render();
}

function editResource(id){ openModal(id); }

async function deleteResource(id){
  if(!confirm('Delete this resource?')) return;
  resources = resources.filter(r=>r.id!==id);
  await saveToStorage();
  render();
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────
function exportCSV(){
  const rows = [['Title','URL','Type','Summary','Tags']];
  resources.forEach(r=>{
    rows.push([
      `"${(r.title||'').replace(/"/g,'""')}"`,
      `"${(r.url||'').replace(/"/g,'""')}"`,
      `"${(r.type||'').replace(/"/g,'""')}"`,
      `"${(r.summary||'').replace(/"/g,'""')}"`,
      `"${(r.tags||[]).join(', ').replace(/"/g,'""')}"`,
    ]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Foodology_Resources.csv';
  a.click();
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===e.currentTarget) closeModal();
});

// ── INIT ──────────────────────────────────────────────────────────────────
loadResources();
</script>
</body>
</html>
